<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SR Query Builder - メインビュー</title>
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/globals.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header class="app__header">
      <div class="app__header-brand">
        <h1 class="app__title">
          <button
            type="button"
            id="app-home-link"
            class="app__title-link"
            title="プロジェクト概要（ホーム）へ戻る"
          >
            SR Query Builder
          </button>
        </h1>
      </div>
      <div class="app__header-status">
        <span class="app__status" id="app-status">起動中…</span>
        <span class="app__context" id="app-context" aria-live="polite"></span>
      </div>
    </header>
    <main class="app__main">
      <aside class="app__sidebar" id="app-sidebar">
        <nav class="app__nav" aria-label="ステップナビ"></nav>
      </aside>
      <section class="app__content" id="app-content"></section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
